name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        toolchain: [stable, nightly]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout 
        uses: actions/checkout@v6
      - name: Restore cached dependencies
        uses: actions/cache/restore@v5
        id: cache-restore
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Use Rust ${{ matrix.toolchain }}
        run: rustup override set ${{ matrix.toolchain }}
      - name: Rustup version
        run: rustup --version
      - name: Install Rust components
        run: rustup component add llvm-tools clippy rustfmt cargo
      - name: Install Cargo binaries
        run: |
          which cargo-llvm-cov || cargo install cargo-llvm-cov
          which cargo-deny || cargo install cargo-deny
      - name: Install ninja-build tool for aws-lc-fips-sys on Windows
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v6
      - name: Install NASM for aws-lc-fips-sys on Windows
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Install golang for aws-lc-fips-sys on macos
        if: runner.os == 'MacOS'
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Check licenses
        run: cargo-deny check licenses
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose --all-features --no-fail-fast --workspace --exclude integration-tests
      - name: Code Coverage
        run: cargo llvm-cov --all-features --workspace --exclude integration-tests --codecov --output-path ./codecov.json
      - name: Publish Code Coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./codecov.json
          fail_ci_if_error: true
          use_oidc: true
      - name: Lint
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Cache dependencies
        uses: actions/cache/save@v5
        if: steps.cache-restore.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
